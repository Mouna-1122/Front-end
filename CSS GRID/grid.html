<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Image Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-4">

        <!-- First Row -->
        <div class="row">

            <div class="col-md-8 mb-4">
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

            <div class="col-md-4 mb-4">
                <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

        </div>

        <!-- Second Row -->
        <div class="row">

            <div class="col-6 col-md-4 mb-4">
                <img src="https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

            <div class="col-6 col-md-4 mb-4">
                <img src="https://images.unsplash.com/photo-1431794062232-2a99a5431c6c?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

            <div class="col-12 col-md-4 mb-4">
                <img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

        </div>

        <!-- Third Row -->
        <div class="row">

            <div class="col-6 mb-4">
                <img src="https://images.unsplash.com/photo-1552083375-1447ce886485?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

            <div class="col-6 mb-4">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=80"
                    alt="">
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
